<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquaaverse AI Diagnosis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        textarea, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        textarea:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .row > .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }
        #result.show {
            display: block;
        }
        #result h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        #result pre {
            background: white;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
        }
        .error { color: #c33; }
        .success { color: #3c3; }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
        @media (max-width: 600px) {
            .container { padding: 25px; }
            h1 { font-size: 24px; }
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐟 Aquaaverse AI Diagnosis</h1>
        <p class="subtitle">Intelligent Aquaculture Disease Detection System</p>
        
        <form id="diagnosisForm">
            <div class="form-group">
                <label>Fish Symptoms *</label>
                <textarea id="symptoms" placeholder="Describe the symptoms you're observing..." required></textarea>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Temperature (°C)</label>
                    <input type="number" id="temperature" placeholder="e.g., 28" step="0.1">
                </div>
                <div class="form-group">
                    <label>pH Level</label>
                    <input type="number" id="pH" placeholder="e.g., 6.8" step="0.1" min="0" max="14">
                </div>
                <div class="form-group">
                    <label>Dissolved Oxygen (mg/L)</label>
                    <input type="number" id="dissolvedOxygen" placeholder="e.g., 5.5" step="0.1" min="0">
                </div>
            </div>
            
            <button type="submit" id="submitBtn">Get AI Diagnosis</button>
        </form>
        
        <div id="result">
            <h2>Diagnosis Result</h2>
            <pre id="diagnosisText"></pre>
        </div>
        
        <div class="footer">
            <p>Powered by Gemini AI | Supabase Edge Functions | Vercel</p>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://hkqmdpsswrinphdxrtpp.supabase.co/functions/v1/diagnose';
        const form = document.getElementById('diagnosisForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const diagnosisText = document.getElementById('diagnosisText');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            resultDiv.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Analyzing...';
            
            try {
                const symptoms = document.getElementById('symptoms').value;
                const temperature = document.getElementById('temperature').value;
                const pH = document.getElementById('pH').value;
                const dissolvedOxygen = document.getElementById('dissolvedOxygen').value;
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symptoms,
                        pondEnvironment: {
                            temperature: temperature ? parseInt(temperature) : undefined,
                            pH: pH ? parseFloat(pH) : undefined,
                            dissolvedOxygen: dissolvedOxygen ? parseFloat(dissolvedOxygen) : undefined
                        }
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.diagnosis) {
                    diagnosisText.textContent = data.diagnosis;
                    resultDiv.classList.add('show');
                } else {
                    diagnosisText.textContent = 'Error: ' + (data.error || 'Failed to get diagnosis');
                    diagnosisText.className = 'error';
                    resultDiv.classList.add('show');
                }
            } catch (error) {
                diagnosisText.textContent = 'Error: ' + error.message;
                diagnosisText.className = 'error';
                resultDiv.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Get AI Diagnosis';
            }
        });
    </script>
</body>
</html>
